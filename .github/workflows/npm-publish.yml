name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go DoH proxy binaries
        # Rebuild from source so the published tarball is reproducible
        # from the tag, not whatever was committed at the time of push.
        working-directory: dns-proxy
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../bin/dns-proxy-bin/sundocked-dns-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ../bin/dns-proxy-bin/sundocked-dns-linux-arm64 .
          ls -la ../bin/dns-proxy-bin/

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
